<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Spots | دليل الأردن الشامل</title>
<style>
    :root { --primary: #667eea; --secondary: #764ba2; --bg: #f8f9fa; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background: var(--bg); transition: 0.3s; }
    header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white; text-align:center; padding:40px 20px; position: relative; }
    .lang-switch { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    [dir="ltr"] .lang-switch { left: auto; right: 15px; }
    .container { max-width:1000px; margin:20px auto; padding:20px; }
    .filter-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: bold; font-size: 0.9em; color: #666; }
    select, input { padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 1em; }
    .place-card { background: white; border-radius: 18px; padding: 25px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
    .place-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .place-name { font-size: 1.4em; font-weight: bold; color: var(--primary); }
    .status-msg { padding: 10px; border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-top: 10px; }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-warn { background: #ffebee; color: #c62828; }
    .empty-state { text-align: center; padding: 60px; color: #aaa; }
</style>
</head>
<body>

<header>
    <button class="lang-switch" onclick="toggleLanguage()" id="lang-btn">English</button>
    <h1 id="main-title">اكتشف الأردن 🇯🇴</h1>
    <p id="sub-title">دليلك الشامل للمواقع والخدمات</p>
</header>

<div class="container">
    <div class="filter-card">
        <div class="filter-group">
            <label id="lbl-cat">اختر الفئة:</label>
            <select id="category" onchange="renderPlaces()"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-budget">الميزانية (JOD):</label>
            <input type="number" id="budget" placeholder="0" oninput="renderPlaces()">
        </div>
        <div class="filter-group">
            <label id="lbl-people">عدد الأشخاص:</label>
            <input type="number" id="people" placeholder="1" oninput="renderPlaces()">
        </div>
    </div>
    <div id="places-container"></div>
</div>

<script>
let currentLang = 'ar';
const translations = {
    ar: { title: "اكتشف الأردن 🇯🇴", subTitle: "دليلك الشامل للمواقع والخدمات", lblCat: "اختر الفئة:", lblBudget: "الميزانية الكلية:", lblPeople: "عدد الأشخاص:", empty: "الرجاء اختيار فئة...", warnBudget: "⚠️ ميزانية منخفضة! تحتاج لـ: ", warnCap: "⚠️ المكان مزدحم لهذا العدد!", ok: "✅ خيار مناسب.", categories: { "": "-- اختر --", university: "🎓 الجامعات", school: "🏫 المدارس", hospital: "🏥 المستشفيات", mall: "🛍️ المولات", pharmacy: "💊 الصيدليات", library: "📚 المكتبات", cafe: "☕ كافيهات", restaurant: "🍽️ مطاعم" } },
    en: { title: "Explore Jordan 🇯🇴", subTitle: "Your Comprehensive Guide", lblCat: "Category:", lblBudget: "Total Budget:", lblPeople: "People Count:", empty: "Please select a category...", warnBudget: "⚠️ Low budget! You need: ", warnCap: "⚠️ Over capacity!", ok: "✅ Great choice.", categories: { "": "-- Select --", university: "🎓 Universities", school: "🏫 Schools", hospital: "🏥 Hospitals", mall: "🛍️ Malls", pharmacy: "💊 Pharmacies", library: "📚 Libraries", cafe: "☕ Cafes", restaurant: "🍽️ Restaurants" } }
};

const places = [
    // --- UNIVERSITIES ---
    {n_ar:"الجامعة الأردنية", n_en:"University of Jordan", cat:"university", cost:0, cap:50000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"جامعة العلوم والتكنولوجيا", n_en:"JUST", cat:"university", cost:0, cap:40000, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"جامعة اليرموك", n_en:"Yarmouk University", cat:"university", cost:0, cap:35000, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"الجامعة الهاشمية", n_en:"Hashemite University", cat:"university", cost:0, cap:30000, loc_ar:"الزرقاء", loc_en:"Zarqa"},
    {n_ar:"جامعة مؤتة", n_en:"Mutah University", cat:"university", cost:0, cap:25000, loc_ar:"الكرك", loc_en:"Kerak"},
    {n_ar:"جامعة آل البيت", n_en:"Al al-Bayt University", cat:"university", cost:0, cap:20000, loc_ar:"المفرق", loc_en:"Mafraq"},
    {n_ar:"جامعة البلقاء التطبيقية", n_en:"Al-Balqa Applied University", cat:"university", cost:0, cap:45000, loc_ar:"السلط", loc_en:"Salt"},
    {n_ar:"جامعة الحسين بن طلال", n_en:"Al-Hussein Bin Talal University", cat:"university", cost:0, cap:15000, loc_ar:"معان", loc_en:"Ma'an"},
    {n_ar:"الجامعة الألمانية الأردنية", n_en:"GJU", cat:"university", cost:0, cap:10000, loc_ar:"مادبا", loc_en:"Madaba"},
    {n_ar:"جامعة الأميرة سمية", n_en:"PSUT", cat:"university", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"جامعة فيلادلفيا", n_en:"Philadelphia University", cat:"university", cost:0, cap:12000, loc_ar:"جرش", loc_en:"Jerash"},
    {n_ar:"جامعة الزيتونة", n_en:"Al-Zaytoonah University", cat:"university", cost:0, cap:15000, loc_ar:"عمان", loc_en:"Amman"},

    // --- SCHOOLS ---
    {n_ar:"مدرسة اليوبيل", n_en:"Jubilee School", cat:"school", cost:0, cap:1000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدارس النظم الحديثة", n_en:"Modern Systems Schools", cat:"school", cost:0, cap:2000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدرسة إربد الثانوية", n_en:"Irbid Secondary School", cat:"school", cost:0, cap:2500, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"مدارس الاتحاد", n_en:"Al-Ittihad Schools", cat:"school", cost:0, cap:3000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"الكلية العلمية الإسلامية", n_en:"ISC", cat:"school", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"أكاديمية عمان", n_en:"Amman Academy", cat:"school", cost:0, cap:1500, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدارس الحصاد التربوي", n_en:"Al-Hassad School", cat:"school", cost:0, cap:2500, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدارس الكلية الأهلية", n_en:"Ahliyyah School", cat:"school", cost:0, cap:1200, loc_ar:"عمان", loc_en:"Amman"},

    // --- HOSPITALS ---
    {n_ar:"مستشفى الجامعة الأردنية", n_en:"JU Hospital", cat:"hospital", cost:0, cap:10000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى الملك عبدالله المؤسس", n_en:"KAUH", cat:"hospital", cost:0, cap:15000, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"المستشفى التخصصي", n_en:"Specialty Hospital", cat:"hospital", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى الاستقلال", n_en:"Istiklal Hospital", cat:"hospital", cost:0, cap:4000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى البشير", n_en:"Al-Bashir Hospital", cat:"hospital", cost:0, cap:20000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدينة الحسين الطبية", n_en:"King Hussein Medical City", cat:"hospital", cost:0, cap:30000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى الرويال", n_en:"Royal Hospital", cat:"hospital", cost:0, cap:3000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى إربد التخصصي", n_en:"Irbid Specialty", cat:"hospital", cost:0, cap:2500, loc_ar:"إربد", loc_en:"Irbid"},

    // --- MALLS ---
    {n_ar:"سيتي مول", n_en:"City Mall", cat:"mall", cost:0, cap:15000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مكة مول", n_en:"Mecca Mall", cat:"mall", cost:0, cap:20000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"تاج مول", n_en:"Taj Mall", cat:"mall", cost:0, cap:12000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"إربد سيتي سنتر", n_en:"Irbid City Center", cat:"mall", cost:0, cap:18000, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"جاليريا مول", n_en:"Galleria Mall", cat:"mall", cost:0, cap:8000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"العبدلي مول", n_en:"Abdali Mall", cat:"mall", cost:0, cap:25000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"سيفوي مول", n_en:"Safeway Mall", cat:"mall", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"أرابيلا مول", n_en:"Arabella Mall", cat:"mall", cost:0, cap:7000, loc_ar:"إربد", loc_en:"Irbid"},

    // --- PHARMACIES ---
    {n_ar:"صيدلية وان (One)", n_en:"One Pharmacy", cat:"pharmacy", cost:0, cap:100, loc_ar:"فروع متعددة", loc_en:"Multiple Branches"},
    {n_ar:"صيدلية فارمسي ون", n_en:"Pharmacy One", cat:"pharmacy", cost:0, cap:150, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"صيدلية دواكم", n_en:"Dawacom", cat:"pharmacy", cost:0, cap:200, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"صيدلية روحي", n_en:"Rawhi Pharmacy", cat:"pharmacy", cost:0, cap:100, loc_ar:"عمان", loc_en:"Amman"},

    // --- LIBRARIES ---
    {n_ar:"المكتبة الوطنية", n_en:"National Library", cat:"library", cost:0, cap:1000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مكتبة شومان", n_en:"Shoman Library", cat:"library", cost:0, cap:800, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مكتبة الأمانة", n_en:"GAM Library", cat:"library", cost:0, cap:500, loc_ar:"عمان", loc_en:"Amman"}
];

function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); }
function updateUI() {
    const t = translations[currentLang]; const h = document.getElementById('html-tag');
    h.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; h.lang = currentLang;
    document.getElementById('lang-btn').textContent = currentLang === 'ar' ? 'English' : 'عربي';
    document.getElementById('main-title').textContent = t.title;
    document.getElementById('sub-title').textContent = t.subTitle;
    document.getElementById('lbl-cat').textContent = t.lblCat;
    document.getElementById('lbl-budget').textContent = t.lblBudget;
    document.getElementById('lbl-people').textContent = t.lblPeople;
    const s = document.getElementById('category'); const v = s.value; s.innerHTML = "";
    for (let k in t.categories) { const o = document.createElement('option'); o.value = k; o.textContent = t.categories[k]; s.appendChild(o); }
    s.value = v; renderPlaces();
}
function renderPlaces() {
    const cat = document.getElementById('category').value;
    const bud = parseFloat(document.getElementById('budget').value) || Infinity;
    const peo = parseInt(document.getElementById('people').value) || 1;
    const con = document.getElementById('places-container');
    const t = translations[currentLang];
    if (!cat) { con.innerHTML = `<div class="empty-state">${t.empty}</div>`; return; }
    con.innerHTML = "";
    places.filter(p => p.cat === cat).forEach(p => {
        const cost = p.cost * peo; let st = '';
        if (bud !== Infinity && bud < cost) st = `<div class="status-msg msg-warn">${t.warnBudget} ${cost} JOD</div>`;
        else if (peo > p.cap) st = `<div class="status-msg msg-warn">${t.warnCap}</div>`;
        else st = `<div class="status-msg msg-ok">${t.ok}</div>`;
        const card = document.createElement('div'); card.className = "place-card";
        card.innerHTML = `<div class="place-name">${currentLang==='ar'?p.n_ar:p.n_en}</div><div style="color:#888">📍 ${currentLang==='ar'?p.loc_ar:p.loc_en}</div>${st}`;
        card.onclick = () => { localStorage.setItem('selectedPlace', JSON.stringify({...p, currentLang})); window.location.href="details.html"; };
        con.appendChild(card);
    });
}
updateUI();
</script>
</body>
</html>
