<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Spots | اكتشف الأردن</title>
<style>
    :root { --primary: #667eea; --secondary: #764ba2; --bg: #f8f9fa; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background: var(--bg); transition: 0.3s; }
    header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white; text-align:center; padding:40px 20px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .lang-switch { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .lang-switch:hover { background: white; color: var(--primary); }
    [dir="ltr"] .lang-switch { left: auto; right: 15px; }
    .container { max-width:1000px; margin:20px auto; padding:20px; }
    .filter-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: bold; font-size: 0.9em; color: #666; }
    select, input { padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 1em; }
    .place-card { background: white; border-radius: 18px; padding: 25px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
    .place-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .place-name { font-size: 1.4em; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
    .status-msg { padding: 10px; border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-top: 10px; }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-warn { background: #ffebee; color: #c62828; }
    .empty-state { text-align: center; padding: 60px; color: #aaa; font-size: 1.2em; }
</style>
</head>
<body>

<header>
    <button class="lang-switch" onclick="toggleLanguage()" id="lang-btn">English</button>
    <h1 id="main-title">اكتشف الأردن 🇯🇴</h1>
    <p id="sub-title">حدد ميزانيتك وعدد أصحابك واترك الباقي علينا</p>
</header>

<div class="container">
    <div class="filter-card">
        <div class="filter-group">
            <label id="lbl-cat">اختر الفئة:</label>
            <select id="category" onchange="renderPlaces()"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-budget">الميزانية الكلية (JOD):</label>
            <input type="number" id="budget" placeholder="0" oninput="renderPlaces()">
        </div>
        <div class="filter-group">
            <label id="lbl-people">عدد الأشخاص:</label>
            <input type="number" id="people" placeholder="1" oninput="renderPlaces()">
        </div>
    </div>
    <div id="places-container"></div>
</div>

<script>
let currentLang = 'ar';
const translations = {
    ar: { title: "اكتشف الأردن 🇯🇴", subTitle: "حدد ميزانيتك وعدد أصحابك واترك الباقي علينا", lblCat: "اختر الفئة:", lblBudget: "الميزانية الكلية (JOD):", lblPeople: "عدد الأشخاص:", empty: "الرجاء اختيار فئة لعرض الأماكن المقترحة...", warnBudget: "⚠️ ميزانية منخفضة! تحتاج لـ: ", warnCap: "⚠️ المكان لا يتسع لهذا العدد!", ok: "✅ هذا المكان مناسب لخياراتك.", categories: { "": "-- اختر الفئة --", cafe: "☕ كافيهات", restaurant: "🍽️ مطاعم", relax: "🏖️ استرخاء وعلاج", heritage: "🏛️ مواقع أثرية", kids: "👶 ترفيه وأطفال", hospital: "🏥 مستشفيات", university: "🎓 جامعات", school: "🏫 مدارس" } },
    en: { title: "Explore Jordan 🇯🇴", subTitle: "Set your budget and people count, we'll guide you", lblCat: "Select Category:", lblBudget: "Total Budget (JOD):", lblPeople: "Number of People:", empty: "Please select a category to see suggestions...", warnBudget: "⚠️ Low budget! You need at least: ", warnCap: "⚠️ Over capacity!", ok: "✅ Suitable place.", categories: { "": "-- Select Category --", cafe: "☕ Cafes", restaurant: "🍽️ Restaurants", relax: "🏖️ Relax & Spa", heritage: "🏛️ Heritage Sites", kids: "👶 Kids & Fun", hospital: "🏥 Hospitals", university: "🎓 Universities", school: "🏫 Schools" } }
};

const places = [
    // --- CAFES ---
    {n_ar:"رومي كافيه", n_en:"Rumi Cafe", cat:"cafe", cost:6, cap:50, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"كتاب كافيه", n_en:"Kitab Coffee House", cat:"cafe", cost:5, cap:40, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"ديجا برو", n_en:"Deja Brew", cat:"cafe", cost:7, cap:30, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"غلوريا جينز", n_en:"Gloria Jean's", cat:"cafe", cost:5, cap:100, loc_ar:"الجامعة الأردنية", loc_en:"JU Branch"},
    {n_ar:"ألموند كافيه", n_en:"Almond Coffee", cat:"cafe", cost:6, cap:50, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"ديمتريز كافيه", n_en:"Dimitri's Coffee", cat:"cafe", cost:6, cap:60, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"بيت بلدنا", n_en:"Beit Baladna", cat:"cafe", cost:4, cap:80, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"بوكس آت كافيه", n_en:"Books@Cafe", cat:"cafe", cost:8, cap:100, loc_ar:"جبل عمان", loc_en:"Jabal Amman"},
    {n_ar:"إسكوايرز كافيه", n_en:"Esquires Coffee", cat:"cafe", cost:6, cap:55, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"كوفي روم", n_en:"Coffee Room", cat:"cafe", cost:5, cap:30, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"كافيه إيطاليا", n_en:"Cafe Italia", cat:"cafe", cost:9, cap:70, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"كابتن كافيه", n_en:"Chapter 9 Cafe", cat:"cafe", cost:5, cap:40, loc_ar:"عمان", loc_en:"Amman"},

    // --- RESTAURANTS ---
    {n_ar:"مطعم هاشم", n_en:"Hashem Restaurant", cat:"restaurant", cost:4, cap:200, loc_ar:"وسط البلد", loc_en:"Downtown"},
    {n_ar:"بيت ستي", n_en:"Beit Sitti", cat:"restaurant", cost:25, cap:20, loc_ar:"اللويبدة", loc_en:"Webdeh"},
    {n_ar:"مطعم القدس", n_en:"Al Quds Restaurant", cat:"restaurant", cost:8, cap:120, loc_ar:"وسط البلد", loc_en:"Downtown"},
    {n_ar:"مطعم الأقصى", n_en:"Al Aqsa Restaurant", cat:"restaurant", cost:5, cap:150, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"مطعم نورجان", n_en:"Noorjan Restaurant", cat:"restaurant", cost:6, cap:100, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"كبابجي", n_en:"Kababji", cat:"restaurant", cost:12, cap:150, loc_ar:"عمان", loc_en:"Amman"},

    {n_ar:"ديوان السلطان إبراهيم", n_en:"Diwan Al Sultan", cat:"restaurant", cost:20, cap:300, loc_ar:"عمان", loc_en:"Amman"},

    // --- RELAX ---
    {n_ar:"البحر الميت", n_en:"Dead Sea", cat:"relax", cost:15, cap:10000, loc_ar:"البحر الميت", loc_en:"Dead Sea"},
    {n_ar:"حمامات ماعين", n_en:"Ma'in Hot Springs", cat:"relax", cost:15, cap:500, loc_ar:"مادبا", loc_en:"Madaba"},

    {n_ar:"محمية عجلون", n_en:"Ajloun Reserve", cat:"relax", cost:5, cap:1000, loc_ar:"عجلون", loc_en:"Ajloun"},
    {n_ar:"وادي الهيدان", n_en:"Wadi Al Hidan", cat:"relax", cost:7, cap:200, loc_ar:"مادبا", loc_en:"Madaba"},

    // --- HERITAGE ---
    {n_ar:"البتراء", n_en:"Petra", cat:"heritage", cost:50, cap:20000, loc_ar:"وادي موسى", loc_en:"Wadi Musa"},
    {n_ar:"جرش الأثرية", n_en:"Jerash Ruins", cat:"heritage", cost:10, cap:15000, loc_ar:"جرش", loc_en:"Jerash"},
    {n_ar:"المدرج الروماني", n_en:"Roman Theater", cat:"heritage", cost:2, cap:6000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"قلعة الكرك", n_en:"Kerak Castle", cat:"heritage", cost:5, cap:3000, loc_ar:"الكرك", loc_en:"Kerak"},
    {n_ar:"أم قيس", n_en:"Umm Qais", cat:"heritage", cost:5, cap:4000, loc_ar:"إربد", loc_en:"Irbid"},

    // --- KIDS ---
    {n_ar:"متحف الأطفال", n_en:"Children's Museum", cat:"kids", cost:5, cap:600, loc_ar:"حدائق الحسين", loc_en:"Amman"},
    {n_ar:"وايفز أكوا بارك", n_en:"Waves Aqua Park", cat:"kids", cost:18, cap:1500, loc_ar:"طريق المطار", loc_en:"Amman"},
    {n_ar:"كلايمبات", n_en:"Climbat", cat:"kids", cost:15, cap:100, loc_ar:"عمان", loc_en:"Amman"},

    // --- HOSPITALS ---
    {n_ar:"مستشفى الجامعة الأردنية", n_en:"Jordan University Hospital", cat:"hospital", cost:0, cap:10000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"المستشفى التخصصي", n_en:"Specialty Hospital", cat:"hospital", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى الاستقلال", n_en:"Istiklal Hospital", cat:"hospital", cost:0, cap:4000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مستشفى الملك عبدالله المؤسس", n_en:"King Abdullah Hospital", cat:"hospital", cost:0, cap:15000, loc_ar:"إربد", loc_en:"Irbid"},

    // --- UNIVERSITIES ---
    {n_ar:"الجامعة الأردنية", n_en:"University of Jordan", cat:"university", cost:0, cap:60000, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"جامعة العلوم والتكنولوجيا", n_en:"JUST University", cat:"university", cost:0, cap:40000, loc_ar:"إربد", loc_en:"Irbid"},
    {n_ar:"جامعة الأميرة سمية", n_en:"PSUT", cat:"university", cost:0, cap:5000, loc_ar:"عمان", loc_en:"Amman"},

    // --- SCHOOLS ---
    {n_ar:"مدرسة اليوبيل", n_en:"Jubilee School", cat:"school", cost:0, cap:1200, loc_ar:"عمان", loc_en:"Amman"},
    {n_ar:"مدرسة إربد الثانوية", n_en:"Irbid Secondary", cat:"school", cost:0, cap:2500, loc_ar:"إربد", loc_en:"Irbid"}
];

function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); }
function updateUI() {
    const t = translations[currentLang]; const h = document.getElementById('html-tag');
    h.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; h.lang = currentLang;
    document.getElementById('lang-btn').textContent = currentLang === 'ar' ? 'English' : 'عربي';
    document.getElementById('main-title').textContent = t.title;
    document.getElementById('sub-title').textContent = t.subTitle;
    document.getElementById('lbl-cat').textContent = t.lblCat;
    document.getElementById('lbl-budget').textContent = t.lblBudget;
    document.getElementById('lbl-people').textContent = t.lblPeople;
    const s = document.getElementById('category'); const v = s.value; s.innerHTML = "";
    for (let k in t.categories) { const o = document.createElement('option'); o.value = k; o.textContent = t.categories[k]; s.appendChild(o); }
    s.value = v; renderPlaces();
}
function renderPlaces() {
    const cat = document.getElementById('category').value;
    const bud = parseFloat(document.getElementById('budget').value) || Infinity;
    const peo = parseInt(document.getElementById('people').value) || 1;
    const con = document.getElementById('places-container');
    const t = translations[currentLang];
    if (!cat) { con.innerHTML = `<div class="empty-state">${t.empty}</div>`; return; }
    con.innerHTML = "";
    places.filter(p => p.cat === cat).forEach(p => {
        const cost = p.cost * peo; let st = '';
        if (bud !== Infinity && bud < cost) st = `<div class="status-msg msg-warn">${t.warnBudget} ${cost} JOD</div>`;
        else if (peo > p.cap) st = `<div class="status-msg msg-warn">${t.warnCap}</div>`;
        else st = `<div class="status-msg msg-ok">${t.ok}</div>`;
        const card = document.createElement('div'); card.className = "place-card";
        card.innerHTML = `<div class="place-name">${currentLang==='ar'?p.n_ar:p.n_en}</div><div style="color:#888; font-size:0.9em;">📍 ${currentLang==='ar'?p.loc_ar:p.loc_en} | 💰 ${p.cost} JOD</div>${st}`;
        card.onclick = () => { localStorage.setItem('selectedPlace', JSON.stringify({...p, currentLang})); window.location.href="details.html"; };
        con.appendChild(card);
    });
}
updateUI();
</script>
</body>
</html>
