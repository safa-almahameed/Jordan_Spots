<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Spots | النسخة الاحترافية</title>
<style>
    :root { --primary: #667eea; --secondary: #764ba2; --bg: #f8f9fa; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background: var(--bg); transition: 0.3s; }
    header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white; text-align:center; padding:40px 20px; position: relative; }
    .lang-switch { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    [dir="ltr"] .lang-switch { left: auto; right: 15px; }
    .container { max-width:1000px; margin:20px auto; padding:20px; }
    .filter-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: bold; font-size: 0.9em; color: #666; }
    select, input { padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 1em; }
    .place-card { background: white; border-radius: 18px; padding: 25px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; position: relative; }
    .place-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .place-name { font-size: 1.4em; font-weight: bold; color: var(--primary); }
    .place-meta { color: #888; font-size: 0.9em; margin-top: 5px; }
    .status-msg { padding: 10px; border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-top: 10px; }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-warn { background: #ffebee; color: #c62828; }
    .empty-state { text-align: center; padding: 60px; color: #aaa; }
</style>
</head>
<body>

<header>
    <button class="lang-switch" onclick="toggleLanguage()" id="lang-btn">English</button>
    <h1 id="main-title">اكتشف الأردن 🇯🇴</h1>
    <p id="sub-title">دليلك الكامل لكل الخدمات والمواقع</p>
</header>

<div class="container">
    <div class="filter-card">
        <div class="filter-group">
            <label id="lbl-cat">اختر الفئة:</label>
            <select id="category" onchange="renderPlaces()"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-budget">الميزانية الكلية (JOD):</label>
            <input type="number" id="budget" placeholder="0" oninput="renderPlaces()">
        </div>
        <div class="filter-group">
            <label id="lbl-people">عدد الأشخاص:</label>
            <input type="number" id="people" value="1" oninput="renderPlaces()">
        </div>
    </div>
    <div id="places-container"></div>
</div>

<script>

const translations = {

    en: { title: "Explore Jordan 🇯🇴", subTitle: "Comprehensive Guide", lblCat: "Category:", lblBudget: "Your Budget:", lblPeople: "People Count:", empty: "Select category...", warnBudget: "⚠️ Low budget! You need: ", warnCap: "⚠️ Over capacity!", ok: "✅ Great choice for you.", categories: { "": "-- Select --", university: "🎓 Universities", school: "🏫 Schools", mall: "🛍️ Malls", cafe: "☕ Cafes", restaurant: "🍽️ Restaurants", heritage: "🏛️ Heritage", ent: "🎮 Entertainment", kids: "👶 Kids", relax: "🧘‍♀️ Relax", library: "📚 Libraries", pharmacy: "💊 Pharmacies" } }

    {n_ar:"جامعة سمية للتكنولوجيا", n_en:"PSUT", cat:"university", cost:5000, cap:5000, loc_ar:"خلدا", loc_en:"Khalda", rate:4.5},
    {n_ar:"جامعة العلوم التطبيقية", n_en:"ASU", cat:"university", cost:4500, cap:10000, loc_ar:"شفا بدران", loc_en:"Shafa Badran", rate:4.1},
    {n_ar:"جامعة الزيتونة", n_en:"Zaytoonah University", cat:"university", cost:4000, cap:15000, loc_ar:"طريق المطار", loc_en:"Airport Road", rate:4.2},

    {n_ar:"جامعة الشرق الأوسط", n_en:"MEU", cat:"university", cost:3750, cap:8000, loc_ar:"الجبيهة", loc_en:"Jubeiha", rate:4.1},
    {n_ar:"جامعة فيلادلفيا", n_en:"Philadelphia University", cat:"university", cost:4000, cap:12000, loc_ar:"جرش", loc_en:"Jerash", rate:4.0},
    {n_ar:"جامعة عمان العربية", n_en:"Amman Arab University", cat:"university", cost:3250, cap:5000, loc_ar:"المفرق", loc_en:"Mafraq", rate:4.0},
    {n_ar:"جامعة الإسراء", n_en:"Isra University", cat:"university", cost:3500, cap:10000, loc_ar:"طريق المطار", loc_en:"Airport Road", rate:3.9},
    {n_ar:"جامعة عمان الأهلية", n_en:"Amman Ahliyya University", cat:"university", cost:4000, cap:15000, loc_ar:"السلط", loc_en:"Salt", rate:4.0},

    // --- SCHOOLS (10+) ---
    {n_ar:"كينغز أكاديمي", n_en:"King’s Academy", cat:"school", cost:20000, cap:1000, loc_ar:"مادبا", loc_en:"Madaba", rate:4.8},
    {n_ar:"الأكاديمية الدولية", n_en:"IAA", cat:"school", cost:11500, cap:2000, loc_ar:"طريق المطار", loc_en:"Airport Road", rate:4.5},
    {n_ar:"مدرسة البكالوريا", n_en:"Amman Baccalaureate", cat:"school", cost:10500, cap:1500, loc_ar:"خلدا", loc_en:"Khalda", rate:4.6},

    {n_ar:"الأهلية للبنات", n_en:"Ahliyyah School", cat:"school", cost:6000, cap:1200, loc_ar:"جبل عمان", loc_en:"Jabal Amman", rate:4.3},
    {n_ar:"مدرسة اليوبيل", n_en:"Jubilee School", cat:"school", cost:3000, cap:1000, loc_ar:"الجبيهة", loc_en:"Jubeiha", rate:4.7},

    {n_ar:"سيتي مول", n_en:"City Mall", cat:"mall", cost:30, cap:15000, loc_ar:"المدينة الطبية", loc_en:"Medical City", rate:4.5},

    {n_ar:"بوكس آت كافيه", n_en:"Books@Cafe", cat:"cafe", cost:7.5, cap:80, loc_ar:"جبل عمان", loc_en:"Jabal Amman", rate:4.5},

    // --- RESTAURANTS ---
    {n_ar:"مطعم هاشم", n_en:"Hashem Restaurant", cat:"restaurant", cost:3.5, cap:200, loc_ar:"وسط البلد", loc_en:"Downtown", rate:4.5},
    {n_ar:"سفرة", n_en:"Sufra", cat:"restaurant", cost:15, cap:60, loc_ar:"الرينبو", loc_en:"Rainbow St", rate:4.6},
    {n_ar:"فخر الدين", n_en:"Fakhreldin", cat:"restaurant", cost:30, cap:100, loc_ar:"جبل عمان", loc_en:"Jabal Amman", rate:4.7},

    // --- HERITAGE ---
    {n_ar:"قلعة عمان", n_en:"Amman Citadel", cat:"heritage", cost:3.5, cap:10000, loc_ar:"جبل القلعة", loc_en:"Citadel Hill", rate:4.5},
    {n_ar:"المدرج الروماني", n_en:"Roman Theater", cat:"heritage", cost:3.5, cap:6000, loc_ar:"وسط البلد", loc_en:"Downtown", rate:4.5},
    {n_ar:"معبد هرقل", n_en:"Temple of Hercules", cat:"heritage", cost:3.5, cap:5000, loc_ar:"جبل القلعة", loc_en:"Citadel Hill", rate:4.6},

    // --- ENTERTAINMENT ---
    {n_ar:"حدائق الحسين", n_en:"Al Hussein Parks", cat:"ent", cost:1, cap:20000, loc_ar:"المدينة الطبية", loc_en:"Medical City", rate:4.6},
    {n_ar:"متحف السيارات الملكي", n_en:"Automobile Museum", cat:"ent", cost:4, cap:500, loc_ar:"حدائق الحسين", loc_en:"Parks", rate:4.7},

    // --- RELAX ---
    {n_ar:"البحر الميت", n_en:"Dead Sea", cat:"relax", cost:60, cap:10000, loc_ar:"البحر الميت", loc_en:"Dead Sea", rate:5.0},
    {n_ar:"حمامات ماعين", n_en:"Ma’in Hot Springs", cat:"relax", cost:32.5, cap:1000, loc_ar:"مادبا", loc_en:"Madaba", rate:4.7},

    // --- LIBRARIES ---
    {n_ar:"مكتبة شومان", n_en:"Shoman Library", cat:"library", cost:1, cap:800, loc_ar:"جبل عمان", loc_en:"Jabal Amman", rate:4.8},

    // --- PHARMACIES ---
    {n_ar:"صيدلية فارمسي ون", n_en:"Pharmacy One", cat:"pharmacy", cost:14, cap:50, loc_ar:"عدة فروع", loc_en:"Multiple", rate:4.3}
];

function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); }

function updateUI() {
    const t = translations[currentLang]; document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('lang-btn').textContent = currentLang === 'ar' ? 'English' : 'عربي';
    document.getElementById('main-title').textContent = t.title;
    document.getElementById('sub-title').textContent = t.subTitle;
    document.getElementById('lbl-cat').textContent = t.lblCat;
    document.getElementById('lbl-budget').textContent = t.lblBudget;
    document.getElementById('lbl-people').textContent = t.lblPeople;
    const s = document.getElementById('category'); const v = s.value; s.innerHTML = "";
    for (let k in t.categories) { const o = document.createElement('option'); o.value = k; o.textContent = t.categories[k]; s.appendChild(o); }
    s.value = v; renderPlaces();
}

function renderPlaces() {
    const cat = document.getElementById('category').value;
    const bud = parseFloat(document.getElementById('budget').value) || Infinity;
    const peo = parseInt(document.getElementById('people').value) || 1;
    const con = document.getElementById('places-container');
    const t = translations[currentLang];

    if (!cat) { con.innerHTML = `<div class="empty-state">${t.empty}</div>`; return; }
    con.innerHTML = "";
    
    places.filter(p => p.cat === cat).forEach(p => {
        const totalCost = p.cost * peo;
        let statusMsg = "";

        if (bud !== Infinity && bud < totalCost) {
            statusMsg = `<div class="status-msg msg-warn">${t.warnBudget} ${totalCost} JOD</div>`;
        } else if (peo > p.cap) {
            statusMsg = `<div class="status-msg msg-warn">${t.warnCap}</div>`;
        } else {
            statusMsg = `<div class="status-msg msg-ok">${t.ok}</div>`;
        }

        const card = document.createElement('div');
        card.className = "place-card";
        card.innerHTML = `
            <div class="place-name">${currentLang === 'ar' ? p.n_ar : p.n_en}</div>
            <div class="place-meta">📍 ${currentLang === 'ar' ? p.loc_ar : p.loc_en} | ⭐ ${p.rate}</div>
            <div class="place-meta">💰 ${p.cost} JOD / Person</div>
            ${statusMsg}
        `;
        card.onclick = () => {
            localStorage.setItem('selectedPlace', JSON.stringify({...p, currentLang}));
            window.location.href = "details.html";
        };
        con.appendChild(card);
    });
}
updateUI();
</script>
</body>
</html>
