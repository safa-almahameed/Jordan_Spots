<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Spots - Full Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
        header { background:#667eea; color:white; text-align:center; padding:20px; }
        .container { max-width:1200px; margin:20px auto; padding:20px; background:white; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
        h2 { margin-bottom:15px; color:#333; }
        .filter-group { margin-bottom:20px; }
        .filter-group label { margin-right:10px; font-weight:bold; }
        .place-card { border:1px solid #ddd; border-radius:10px; padding:15px; margin-bottom:15px; background:#fafafa; cursor:pointer; transition:0.2s; }
        .place-card:hover { background:#e8f0fe; }
        .place-name { font-weight:bold; font-size:1.2em; color: #667eea; }
        .place-info { font-size:0.9em; color:#555; margin-top:5px; }
    </style>
</head>
<body>

<header>
    <h1>Jordan Spots - Discover Jordan</h1>
</header>

<div class="container">
    <div class="filter-group">
        <label for="category">Category:</label>
        <select id="category">
            <option value="">All</option>
            <option value="cafe">Cafe</option>
            <option value="restaurant">Restaurant</option>
            <option value="relax">Relaxation</option>
            <option value="kids">Kids</option>
        </select>

        <label for="type">Type:</label>
        <select id="type">
            <option value="">All</option>
            <option value="public">Public</option>
            <option value="private">Private</option>
        </select>
    </div>

    <div id="places-container"></div>
</div>

<script>
const places = [
  {name:"Rumi Café", category:"cafe", type:"private", cost:5, rating:4.5, desc:"Cozy café with great coffee", location:"Amman"},
  {name:"مطعم هاشم", category:"restaurant", type:"private", cost:5, rating:4.7, desc:"وجبات شعبية مشهورة", location:"Amman"},
  {name:"البحر الميت", category:"relax", type:"public", cost:90, rating:4.8, desc:"سباحة وطين علاجي", location:"Dead Sea"},
  {name:"متحف الأطفال", category:"kids", type:"public", cost:5, rating:4.5, desc:"تعليم وترفيه للأطفال", location:"Amman"},
  // يمكنك إضافة بقية القائمة هنا...
];

const container = document.getElementById('places-container');

function displayPlaces(filteredPlaces) {
    container.innerHTML = "";
    if(filteredPlaces.length === 0){
        container.innerHTML = "<p>No places match your filter.</p>";
        return;
    }
    filteredPlaces.forEach((p) => {
        const card = document.createElement('div');
        card.className = "place-card";
        card.innerHTML = `
            <div class="place-name">${p.name}</div>
            <div class="place-info">Category: ${p.category} | Cost: ${p.cost} JOD</div>
            <div class="place-info">${p.desc}</div>
        `;
        // عند الضغط على الكرت، نحفظ البيانات وننتقل لصفحة التفاصيل
        card.addEventListener('click', () => {
            localStorage.setItem('selectedPlace', JSON.stringify(p));
            window.location.href = "details.html";
        });
        container.appendChild(card);
    });
}

function applyFilter(){
    const cat = document.getElementById('category').value;
    const typ = document.getElementById('type').value;
    const filtered = places.filter(p => {
        return (cat === "" || p.category === cat) && (typ === "" || p.type === typ);
    });
    displayPlaces(filtered);
}

document.getElementById('category').addEventListener('change', applyFilter);
document.getElementById('type').addEventListener('change', applyFilter);

displayPlaces(places);
</script>
</body>
</html>
