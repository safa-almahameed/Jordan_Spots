<style>

    header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white; text-align:center; padding:50px 20px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .lang-switch { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .lang-switch:hover { background: white; color: var(--primary); }
    [dir="ltr"] .lang-switch { left: auto; right: 20px; }
    .container { max-width:1100px; margin: -30px auto 40px; padding: 0 20px; }
    .filter-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
    .filter-group { display: flex; flex-direction: column; gap: 10px; }
    label { font-weight: bold; font-size: 0.95em; color: #555; }
    select, input { padding: 14px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 1em; transition: 0.3s; }
    select:focus, input:focus { border-color: var(--primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
    .place-card { background: white; border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; position: relative; overflow: hidden; }
    .place-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(102,126,234,0.15); border-color: var(--primary); }
    .category-badge { position: absolute; top: 0; right: 0; background: #eee; padding: 5px 15px; font-size: 0.8em; border-bottom-left-radius: 15px; color: #666; }
    [dir="ltr"] .category-badge { right: auto; left: 0; border-bottom-left-radius: 0; border-bottom-right-radius: 15px; }
    .place-name { font-size: 1.3em; font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; }
    .detail { font-size: 0.95em; color: #666; margin: 5px 0; display: flex; align-items: center; gap: 8px; }
    .rating { color: #f1c40f; font-weight: bold; }
    .status-msg { margin-top: 15px; padding: 8px 12px; border-radius: 8px; font-size: 0.85em; font-weight: bold; text-align: center; }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-warn { background: #ffebee; color: #c62828; }
    .empty-state { text-align: center; padding: 100px; color: #999; grid-column: 1 / -1; }
</style>

function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); }

function updateUI() {
    const t = translations[currentLang];
    const h = document.getElementById('html-tag');
    h.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    h.lang = currentLang;
    
    document.getElementById('lang-btn').textContent = currentLang === 'ar' ? 'English' : 'عربي';
    document.getElementById('main-title').textContent = t.title;
    document.getElementById('sub-title').textContent = t.subTitle;
    document.getElementById('lbl-cat').textContent = t.lblCat;
    document.getElementById('lbl-budget').textContent = t.lblBudget;
    document.getElementById('lbl-people').textContent = t.lblPeople;
    
    const s = document.getElementById('category');
    const v = s.value; s.innerHTML = "";
    for (let k in t.categories) {
        const o = document.createElement('option');
        o.value = k; o.textContent = t.categories[k];
        s.appendChild(o);
    }
    s.value = v;
    renderPlaces();
}

function renderPlaces() {
    const cat = document.getElementById('category').value;
    const bud = parseFloat(document.getElementById('budget').value) || Infinity;
    const peo = parseInt(document.getElementById('people').value) || 1;
    const con = document.getElementById('places-container');
    const t = translations[currentLang];

    if (!cat) { con.innerHTML = `<div class="empty-state"><h3>${t.empty}</h3></div>`; return; }
    
    con.innerHTML = "";
    const filtered = places.filter(p => p.cat === cat);

    filtered.forEach(p => {
        const totalCost = p.cost * peo;
        let statusClass = "msg-ok";
        let statusText = t.ok;

        if (bud !== Infinity && bud < totalCost) {
            statusClass = "msg-warn";
            statusText = t.warnBudget + totalCost + " JOD";
        }

        const card = document.createElement('div');
        card.className = "place-card";
        card.innerHTML = `
            <div class="category-badge">${t.categories[p.cat]}</div>
            <span class="place-name">${currentLang === 'ar' ? p.n_ar : p.n_en}</span>
            <div class="detail">📍 <span>${currentLang === 'ar' ? p.loc_ar : p.loc_en}</span></div>
            <div class="detail">⭐ <span class="rating">${p.rate} / 5.0</span></div>
            <div class="detail">💰 <span>${p.cost} JOD / Person</span></div>
            <div class="status-msg ${statusClass}">${statusText}</div>
        `;
        
        card.onclick = () => {
            localStorage.setItem('selectedPlace', JSON.stringify({...p, currentLang}));
            window.location.href = "details.html";
        };
        con.appendChild(card);
    });
}

updateUI();
</script>
